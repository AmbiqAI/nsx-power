schema_version: 1
module:
  name: nsx-power
  type: backend_specific
  version: 0.1.1
support:
  ambiqsuite: true
  zephyr: false
summary: >-
  Power-management helpers for sleep policy, shutdown control, and low-power
  workflows.
capabilities:
  - power
  - low_power
  - sleep_control
use_cases:
  - low-power application behavior
  - sleep and wake control
  - power-policy experimentation and validation
agent_keywords:
  - power
  - sleep
  - low power
  - wake
build:
  cmake:
    package: nsx_power
    targets:
      - nsx::power
depends:
  required:
    - nsx-core
    - nsx-harness
    - nsx-utils
    - nsx-soc-hal
  optional: []
compatibility:
  boards:
    - '*'
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
